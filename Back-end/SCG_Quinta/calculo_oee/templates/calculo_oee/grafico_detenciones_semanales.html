{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Detenciones semanales OEE</title>

    <link
        rel="stylesheet"
        href="{% static 'calculo_oee/estilos_oee.css' %}"
    >

    <link
        rel="icon"
        href="{% static 'calculo_oee/images/logoquinta2.png' %}"
    >

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            font-family: "Quicksand", Arial, sans-serif;
        }

        .pagina-detenciones {
            width: min(1500px, 96%);
            margin: 24px auto;
        }

        .encabezado-detenciones {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .encabezado-detenciones img {
            width: 135px;
            height: auto;
        }

        .encabezado-detenciones h1 {
            margin: 0;
            font-size: clamp(24px, 3vw, 38px);
            color: #333;
        }

        .panel {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .filtros {
            display: grid;
            grid-template-columns:
                repeat(3, minmax(180px, 1fr))
                auto auto;
            gap: 14px;
            align-items: end;
            margin-bottom: 20px;
        }

        .grupo-filtro {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .grupo-filtro label {
            font-weight: 700;
            color: #444;
        }

        .grupo-filtro select {
            width: 100%;
            min-height: 42px;
            padding: 8px 10px;
            border: 1px solid #cfd5da;
            border-radius: 7px;
            background: #fff;
            font-size: 15px;
        }

        .boton {
            min-height: 42px;
            border: 0;
            border-radius: 7px;
            padding: 9px 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }

        .boton-aplicar {
            background: #b43c2c;
            color: #fff;
        }

        .boton-limpiar {
            background: #e8ebee;
            color: #333;
        }

        .boton:hover {
            opacity: 0.9;
        }

        .informacion-semana {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            color: #555;
            font-size: 14px;
        }

        .leyenda-turnos {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 15px;
        }

        .leyenda-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
        }

        .color-turno {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .color-b {
            background: rgba(54, 162, 235, 0.8);
        }

        .color-c {
            background: rgba(255, 159, 64, 0.8);
        }

        .contenedor-grafico {
            position: relative;
            width: 100%;
            height: 580px;
            overflow-x: auto;
            background: #fff;
        }

        .contenedor-grafico canvas {
            min-width: 1000px;
        }

        .sin-datos {
            display: none;
            padding: 30px;
            text-align: center;
            font-weight: 700;
            color: #777;
        }

        .cargando {
            display: none;
            padding: 10px;
            text-align: center;
            color: #666;
        }

        @media (max-width: 900px) {
            .filtros {
                grid-template-columns: 1fr 1fr;
            }

            .encabezado-detenciones {
                flex-direction: column;
                text-align: center;
            }

            .contenedor-grafico {
                height: 500px;
            }
        }

        @media (max-width: 550px) {
            .pagina-detenciones {
                width: 98%;
                margin: 10px auto;
            }

            .panel {
                padding: 12px;
            }

            .filtros {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="pagina-detenciones">

    <div class="encabezado-detenciones">
        <img
            src="{% static 'calculo_oee/images/logoquinta.png' %}"
            alt="Logo Quinta"
        >

        <h1>Detenciones semanales OEE</h1>
    </div>

    <div class="panel">

        <div class="filtros">

            <div class="grupo-filtro">
                <label for="filtroAnio">Año</label>
                <select id="filtroAnio"></select>
            </div>

            <div class="grupo-filtro">
                <label for="filtroSemana">Semana</label>
                <select id="filtroSemana"></select>
            </div>

            <div class="grupo-filtro">
                <label for="filtroLinea">Línea</label>
                <select id="filtroLinea">
                    <option value="">Todas las líneas</option>
                </select>
            </div>

            <button
                type="button"
                id="btnAplicar"
                class="boton boton-aplicar"
            >
                Aplicar
            </button>

            <button
                type="button"
                id="btnLimpiar"
                class="boton boton-limpiar"
            >
                Limpiar
            </button>

        </div>

        <div id="informacionSemana" class="informacion-semana"></div>

        <div class="leyenda-turnos">
            <div class="leyenda-item">
                <span class="color-turno color-b"></span>
                Turno B: 07:00 a 14:30
            </div>

            <div class="leyenda-item">
                <span class="color-turno color-c"></span>
                Turno C: 14:30 a 22:00
            </div>
        </div>

        <div id="mensajeCargando" class="cargando">
            Cargando detenciones...
        </div>

        <div id="mensajeSinDatos" class="sin-datos">
            No existen detenciones registradas para los filtros seleccionados.
        </div>

        <div class="contenedor-grafico">
            <canvas id="graficoDetencionesSemanales"></canvas>
        </div>

    </div>
    <div class="botones" style="margin-top:16px;">
        <a href="{% url 'redireccionar_intermedio_4' %}" class="primary-button login-button">🏠 Volver al Inicio</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>

<script src="
https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0
"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {
    const filtroAnio = document.getElementById("filtroAnio");
    const filtroSemana = document.getElementById("filtroSemana");
    const filtroLinea = document.getElementById("filtroLinea");

    const btnAplicar = document.getElementById("btnAplicar");
    const btnLimpiar = document.getElementById("btnLimpiar");

    const mensajeCargando = document.getElementById("mensajeCargando");
    const mensajeSinDatos = document.getElementById("mensajeSinDatos");
    const informacionSemana = document.getElementById("informacionSemana");

    const canvas = document.getElementById(
        "graficoDetencionesSemanales"
    );

    let grafico = null;

    const URL_OPCIONES =
        "{% url 'detenciones_semanales_opciones_api' %}";

    const URL_DATOS =
        "{% url 'detenciones_semanales_api' %}";

    const MINUTO_INICIO = 7 * 60;       // 07:00
    const CAMBIO_TURNO = 14 * 60 + 30;  // 14:30
    const MINUTO_FIN = 22 * 60;         // 22:00

    const nombresDias = [
        "Lunes",
        "Martes",
        "Miércoles",
        "Jueves",
        "Viernes",
        "Sábado",
        "Domingo"
    ];

    function minutosAHora(minutos) {
        let minutosNormalizados = Number(minutos);

        if (minutosNormalizados >= 1440) {
            minutosNormalizados -= 1440;
        }

        const horas = Math.floor(minutosNormalizados / 60);
        const mins = minutosNormalizados % 60;

        return (
            String(horas).padStart(2, "0") +
            ":" +
            String(mins).padStart(2, "0")
        );
    }

    function fechaChile(fechaISO) {
        if (!fechaISO) return "";

        const partes = fechaISO.split("-");

        return `${partes[2]}-${partes[1]}-${partes[0]}`;
    }

    function obtenerSemanaActual() {
        const hoy = new Date();
        const fecha = new Date(
            Date.UTC(
                hoy.getFullYear(),
                hoy.getMonth(),
                hoy.getDate()
            )
        );

        const numeroDia = fecha.getUTCDay() || 7;

        fecha.setUTCDate(
            fecha.getUTCDate() + 4 - numeroDia
        );

        const inicioAnio = new Date(
            Date.UTC(fecha.getUTCFullYear(), 0, 1)
        );

        return Math.ceil(
            (
                (
                    fecha - inicioAnio
                ) / 86400000 + 1
            ) / 7
        );
    }

    function llenarSelect(select, valores) {
        select.innerHTML = "";

        valores.forEach(valor => {
            const opcion = document.createElement("option");
            opcion.value = valor;
            opcion.textContent = valor;
            select.appendChild(opcion);
        });
    }

    async function cargarOpciones() {
        try {
            const respuesta = await fetch(URL_OPCIONES, {
                credentials: "same-origin"
            });

            if (!respuesta.ok) {
                throw new Error(
                    await respuesta.text()
                );
            }

            const opciones = await respuesta.json();

            llenarSelect(
                filtroAnio,
                opciones.anios || []
            );

            llenarSelect(
                filtroSemana,
                opciones.semanas || []
            );

            filtroLinea.innerHTML =
                '<option value="">Todas las líneas</option>';

            (opciones.lineas || []).forEach(linea => {
                const opcion = document.createElement("option");
                opcion.value = linea;
                opcion.textContent = linea;
                filtroLinea.appendChild(opcion);
            });

            const anioActual = new Date().getFullYear();
            const semanaActual = obtenerSemanaActual();

            if (
                Array.from(filtroAnio.options)
                    .some(opcion => Number(opcion.value) === anioActual)
            ) {
                filtroAnio.value = anioActual;
            } else if (filtroAnio.options.length) {
                filtroAnio.selectedIndex =
                    filtroAnio.options.length - 1;
            }

            if (
                Array.from(filtroSemana.options)
                    .some(
                        opcion =>
                            Number(opcion.value) === semanaActual
                    )
            ) {
                filtroSemana.value = semanaActual;
            } else if (filtroSemana.options.length) {
                filtroSemana.selectedIndex =
                    filtroSemana.options.length - 1;
            }

        } catch (error) {
            console.error(
                "Error cargando opciones:",
                error
            );
        }
    }

    function construirEtiquetasDias(fechaInicio) {
        const etiquetas = [];

        const partes = fechaInicio.split("-");

        const fechaBase = new Date(
            Number(partes[0]),
            Number(partes[1]) - 1,
            Number(partes[2])
        );

        for (let indice = 0; indice < 7; indice++) {
            const fechaDia = new Date(fechaBase);
            fechaDia.setDate(fechaBase.getDate() + indice);

            const dia = String(
                fechaDia.getDate()
            ).padStart(2, "0");

            const mes = String(
                fechaDia.getMonth() + 1
            ).padStart(2, "0");

            etiquetas.push(
                `${nombresDias[indice]} ${dia}-${mes}`
            );
        }

        return etiquetas;
    }

    function destruirGrafico() {
        if (grafico) {
            grafico.destroy();
            grafico = null;
        }
    }

    function prepararDatos(detenciones, etiquetasDias) {
        const turnoB = [];
        const turnoC = [];

        detenciones.forEach(detencion => {
            const punto = {
                x: [
                    detencion.inicio_minutos,
                    detencion.fin_minutos
                ],
                y: etiquetasDias[detencion.dia_indice],

                motivo: detencion.motivo,
                comentarios: detencion.comentarios,
                turno: detencion.turno,
                linea: detencion.linea,
                fecha: detencion.fecha,
                hora_inicio: detencion.hora_inicio,
                hora_fin: detencion.hora_fin,
                duracion: detencion.duracion,
                lote_id: detencion.lote_id
            };

            if (detencion.turno === "B") {
                turnoB.push(punto);
            }

            if (detencion.turno === "C") {
                turnoC.push(punto);
            }
        });

        return {
            turnoB,
            turnoC
        };
    }

    function construirGrafico(respuesta) {
        destruirGrafico();

        const etiquetasDias = construirEtiquetasDias(
            respuesta.fecha_inicio
        );

        const datosPreparados = prepararDatos(
            respuesta.datos,
            etiquetasDias
        );

        grafico = new Chart(canvas, {
            type: "bar",

            data: {
                labels: etiquetasDias,

                datasets: [
                    {
                        label: "Turno B",
                        data: datosPreparados.turnoB,
                        backgroundColor:
                            "rgba(54, 162, 235, 0.82)",
                        borderColor:
                            "rgba(54, 162, 235, 1)",
                        borderWidth: 1,
                        borderRadius: 4,
                        barThickness: 22
                    },
                    {
                        label: "Turno C",
                        data: datosPreparados.turnoC,
                        backgroundColor:
                            "rgba(255, 159, 64, 0.82)",
                        borderColor:
                            "rgba(255, 159, 64, 1)",
                        borderWidth: 1,
                        borderRadius: 4,
                        barThickness: 22
                    }
                ]
            },

            options: {
                indexAxis: "y",
                responsive: true,
                maintainAspectRatio: false,

                parsing: {
                    xAxisKey: "x",
                    yAxisKey: "y"
                },

                interaction: {
                    mode: "nearest",
                    intersect: true
                },

                plugins: {
                    legend: {
                        display: false
                    },

                    tooltip: {
                        callbacks: {
                            title: function (items) {
                                if (!items.length) return "";

                                const dato = items[0].raw;

                                return (
                                    fechaChile(dato.fecha) +
                                    " · Turno " +
                                    dato.turno
                                );
                            },

                            label: function (context) {
                                const dato = context.raw;

                                return [
                                    `Motivo: ${dato.motivo}`,
                                    `Línea: ${dato.linea}`,
                                    (
                                        `Horario: ${dato.hora_inicio}` +
                                        ` a ${dato.hora_fin}`
                                    ),
                                    `Duración: ${dato.duracion} minutos`,
                                    dato.comentarios
                                        ? `Comentario: ${dato.comentarios}`
                                        : ""
                                ].filter(Boolean);
                            }
                        }
                    },

                    annotation: {
                        annotations: {
                            fondoTurnoB: {
                                type: "box",
                                xMin: MINUTO_INICIO,
                                xMax: CAMBIO_TURNO,
                                backgroundColor:
                                    "rgba(54, 162, 235, 0.05)",
                                borderWidth: 0,

                                label: {
                                    display: true,
                                    content: "Turno B",
                                    position: {
                                        x: "center",
                                        y: "start"
                                    },
                                    color: "#39789d",
                                    font: {
                                        weight: "bold"
                                    }
                                }
                            },

                            fondoTurnoC: {
                                type: "box",
                                xMin: CAMBIO_TURNO,
                                xMax: MINUTO_FIN,
                                backgroundColor:
                                    "rgba(255, 159, 64, 0.05)",
                                borderWidth: 0,

                                label: {
                                    display: true,
                                    content: "Turno C",
                                    position: {
                                        x: "center",
                                        y: "start"
                                    },
                                    color: "#a86720",
                                    font: {
                                        weight: "bold"
                                    }
                                }
                            },

                            separadorTurnos: {
                                type: "line",
                                xMin: CAMBIO_TURNO,
                                xMax: CAMBIO_TURNO,
                                borderColor: "#555",
                                borderWidth: 2,
                                borderDash: [6, 5],

                                label: {
                                    display: true,
                                    content: "14:30",
                                    position: "start",
                                    backgroundColor: "#555",
                                    color: "#fff"
                                }
                            }
                        }
                    }
                },

                scales: {
                    x: {
                        type: "linear",
                        min: MINUTO_INICIO,
                        max: MINUTO_FIN,

                        title: {
                            display: true,
                            text: "Horario del día",
                            font: {
                                size: 15,
                                weight: "bold"
                            }
                        },

                        ticks: {
                            stepSize: 30,

                            callback: function (valor) {
                                return minutosAHora(valor);
                            },

                            maxRotation: 45,
                            minRotation: 45
                        },

                        grid: {
                            color: function (context) {
                                const valor = context.tick.value;

                                if (valor === CAMBIO_TURNO) {
                                    return "rgba(0, 0, 0, 0.45)";
                                }

                                if (valor % 60 === 0) {
                                    return "rgba(0, 0, 0, 0.15)";
                                }

                                return "rgba(0, 0, 0, 0.06)";
                            }
                        }
                    },

                    y: {
                        stacked: false,

                        title: {
                            display: true,
                            text: "Días de la semana",
                            font: {
                                size: 15,
                                weight: "bold"
                            }
                        },

                        ticks: {
                            font: {
                                size: 13,
                                weight: "bold"
                            }
                        },

                        grid: {
                            color: "rgba(0, 0, 0, 0.08)"
                        }
                    }
                }
            }
        });
    }

    async function cargarDetenciones() {
        const semana = filtroSemana.value;
        const anio = filtroAnio.value;
        const linea = filtroLinea.value;

        if (!semana || !anio) {
            mensajeSinDatos.style.display = "block";
            mensajeSinDatos.textContent =
                "Debe seleccionar una semana y un año.";
            return;
        }

        mensajeCargando.style.display = "block";
        mensajeSinDatos.style.display = "none";

        const parametros = new URLSearchParams({
            semana: semana,
            anio: anio
        });

        if (linea) {
            parametros.set("linea", linea);
        }

        try {
            const respuestaHttp = await fetch(
                `${URL_DATOS}?${parametros.toString()}`,
                {
                    credentials: "same-origin"
                }
            );

            if (!respuestaHttp.ok) {
                throw new Error(
                    await respuestaHttp.text()
                );
            }

            const respuesta = await respuestaHttp.json();

            informacionSemana.innerHTML = `
                <strong>Semana ${respuesta.semana}</strong>
                <span>
                    Desde ${fechaChile(respuesta.fecha_inicio)}
                    hasta ${fechaChile(respuesta.fecha_fin)}
                </span>
                <span>
                    Línea: ${linea || "Todas"}
                </span>
                <span>
                    Detenciones: ${respuesta.datos.length}
                </span>
            `;

            if (!respuesta.datos.length) {
                destruirGrafico();
                mensajeSinDatos.style.display = "block";
                mensajeSinDatos.textContent =
                    "No existen detenciones registradas " +
                    "para esta semana y línea.";
                return;
            }

            construirGrafico(respuesta);

        } catch (error) {
            console.error(
                "Error cargando detenciones:",
                error
            );

            destruirGrafico();

            mensajeSinDatos.style.display = "block";
            mensajeSinDatos.textContent =
                "No fue posible cargar las detenciones.";

        } finally {
            mensajeCargando.style.display = "none";
        }
    }

    btnAplicar.addEventListener(
        "click",
        cargarDetenciones
    );

    btnLimpiar.addEventListener("click", function () {
        filtroLinea.value = "";

        if (filtroAnio.options.length) {
            filtroAnio.selectedIndex =
                filtroAnio.options.length - 1;
        }

        if (filtroSemana.options.length) {
            filtroSemana.selectedIndex =
                filtroSemana.options.length - 1;
        }

        cargarDetenciones();
    });

    await cargarOpciones();
    await cargarDetenciones();
});
</script>

</body>
</html>
