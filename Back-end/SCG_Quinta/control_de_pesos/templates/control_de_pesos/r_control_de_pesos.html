{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'control_de_pesos/estilos_r_control_de_pesos.css' %}">
    <link rel="icon" href="{% static 'control_de_pesos/images/logoquinta2.png' %}" />
    <title>Registro control Pesos Tortas R-POE-Q-04-XX</title>

    <style>
        .muestras-box {
            margin-top: 18px;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.75);
            border: 1px solid #e5e7eb;
        }

        .muestras-titulo {
            margin: 0 0 12px 0;
            font-size: 16px;
            font-weight: 700;
            color: #B43C2C;
            text-align: center;
        }

        .tabla-muestras-wrap {
            width: 100%;
            overflow-x: auto;
        }

        .tabla-muestras {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .tabla-muestras th,
        .tabla-muestras td {
            border: 1px solid #e5e7eb;
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }

        .tabla-muestras th {
            background: #f8f8f8;
            font-weight: 700;
            font-size: 13px;
        }

        .tabla-muestras input {
            width: 100%;
            min-width: 110px;
            box-sizing: border-box;
            margin: 0;
        }

        .num-muestra {
            font-weight: 700;
            color: #B43C2C;
            width: 48px;
        }

        .acciones-muestras {
            margin-top: 14px;
            display: flex;
            justify-content: center;
        }

        .btn-secundario {
            background-color: #d07020;
            border-radius: 8px;
            border: none;
            color: white;
            min-width: 180px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            min-height: 42px;
            padding: 8px 16px;
        }

        .btn-secundario:hover {
            opacity: 0.95;
        }

        .btn-eliminar-fila {
            background-color: #B43C2C;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            min-height: 36px;
            padding: 8px 12px;
        }

        .btn-eliminar-fila:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .muestras-box {
                padding: 12px;
            }

            .tabla-muestras th,
            .tabla-muestras td {
                padding: 8px;
            }

            .btn-secundario {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <img src="{% static 'control_de_pesos/images/logoquinta.png' %}" alt="logo" class="logo">

        <div class="login-container">
            <h1 class="title">Registro control de pesos Tortas R-POE-Q-04-XX</h1>
        </div>

        <div class="login-container">
            <!-- Selección de Cliente -->
            <label for="cliente">Cliente</label>
            <select id="cliente" name="cliente" class="input" required>
                <option value="">-- Selecciona cliente --</option>
            </select>

            <!-- Selección de Producto -->
            <label for="producto">Producto</label>
            <select id="producto" name="producto" class="input" required>
                <option value="">-- Selecciona producto --</option>
            </select>

            <!-- Campo que mostrará el código producto -->
            <label for="codigo">Código producto</label>
            <input type="text" id="codigo_producto" name="codigo_producto" class="input" readonly placeholder="–">

            <!-- Campo que mostrará el peso receta -->
            <label for="peso">Peso receta (gr)</label>
            <input type="number" id="peso_receta" name="peso_receta" class="input" readonly placeholder="–">

            <script>
            const AREA_CONTROL_PESOS = "TORTAS";

            const selectCliente = document.getElementById("cliente");
            const selectProducto = document.getElementById("producto");
            const inputCodigo = document.getElementById("codigo_producto");
            const inputPesoReceta = document.getElementById("peso_receta");

            let productosBase = [];

            async function cargarClientes() {
                const response = await fetch(`/control_de_pesos/api/clientes_base/?area=${AREA_CONTROL_PESOS}`);
                const data = await response.json();

                selectCliente.innerHTML = `<option value="">-- Selecciona cliente --</option>`;

                if (data.ok) {
                    data.clientes.forEach(cliente => {
                        const option = document.createElement("option");
                        option.value = cliente;
                        option.textContent = cliente;
                        selectCliente.appendChild(option);
                    });
                }
            }

            async function cargarProductosPorCliente(cliente) {
                selectProducto.innerHTML = `<option value="">-- Selecciona producto --</option>`;
                inputCodigo.value = "";
                inputPesoReceta.value = "";
                productosBase = [];

                if (!cliente) return;

                const url = `/control_de_pesos/api/productos_base/?area=${AREA_CONTROL_PESOS}&cliente=${encodeURIComponent(cliente)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.ok) {
                    productosBase = data.productos;

                    productosBase.forEach(item => {
                        const option = document.createElement("option");
                        option.value = item.id;
                        option.textContent = `${item.codigo} - ${item.producto}`;
                        selectProducto.appendChild(option);
                    });
                }
            }

            selectCliente.addEventListener("change", function () {
                cargarProductosPorCliente(this.value);
            });

            selectProducto.addEventListener("change", function () {
                const productoSeleccionado = productosBase.find(p => String(p.id) === String(this.value));

                if (!productoSeleccionado) {
                    inputCodigo.value = "";
                    inputPesoReceta.value = "";
                    return;
                }

                inputCodigo.value = productoSeleccionado.codigo || "";
                inputPesoReceta.value = productoSeleccionado.peso_receta || "";
            });

            document.addEventListener("DOMContentLoaded", cargarClientes);
            </script>

            <div class="muestras-box">
                <h3 class="muestras-titulo">Muestras de peso y altura</h3>

                <div class="tabla-muestras-wrap">
                    <table class="tabla-muestras">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Peso real (gr)</th>
                                <th>Altura (mm)</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-muestras">
                            <tr class="fila-muestra">
                                <td class="num-muestra">1</td>
                                <td>
                                    <input
                                        type="number"
                                        class="input input-peso-real"
                                        min="0"
                                        step="1"
                                        placeholder="-"
                                        required
                                    >
                                </td>
                                <td>
                                    <input
                                        type="number"
                                        class="input input-altura"
                                        min="0"
                                        step="1"
                                        placeholder="-"
                                    >
                                </td>
                                <td>
                                    <button
                                        type="button"
                                        class="btn-eliminar-fila"
                                        disabled
                                    >
                                        Eliminar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="acciones-muestras">
                    <button type="button" id="btn-agregar-fila" class="btn-secundario">
                        + Agregar muestra
                    </button>
                </div>
            </div>

            <!-- Campo que mostrará el lote -->
            <label for="lote">Lote</label>
            <input type="text" id="lote" class="input" placeholder="-" required>

            <!-- Campo que mostrara el turno A-B-C -->
            <label for="turno">Turno</label>
            <select id="turno" class="input">
                <option value="">-- Selecciona turno --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select>
        </div>

        <div class="botones">
            <form class="form">
                {% csrf_token %}
                <button class="primary-button login-button" id="miBoton">Grabar y continuar</button>
            </form>

            <form class="form" action="{% url 'redireccionar_selecciones_2' %}">
                <button class="primary-button login-button">Salir</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tbodyMuestras = document.getElementById("tbody-muestras");
            const btnAgregarFila = document.getElementById("btn-agregar-fila");

            function renumerarFilas() {
                const filas = tbodyMuestras.querySelectorAll(".fila-muestra");
                filas.forEach((fila, index) => {
                    const celdaNumero = fila.querySelector(".num-muestra");
                    const btnEliminar = fila.querySelector(".btn-eliminar-fila");

                    if (celdaNumero) {
                        celdaNumero.textContent = index + 1;
                    }

                    if (btnEliminar) {
                        btnEliminar.disabled = filas.length === 1;
                    }
                });
            }

            function crearFila() {
                const tr = document.createElement("tr");
                tr.className = "fila-muestra";
                tr.innerHTML = `
                    <td class="num-muestra"></td>
                    <td>
                        <input
                            type="number"
                            class="input input-peso-real"
                            min="0"
                            step="1"
                            placeholder="-"
                            required
                        >
                    </td>
                    <td>
                        <input
                            type="number"
                            class="input input-altura"
                            min="0"
                            step="1"
                            placeholder="-"
                        >
                    </td>
                    <td>
                        <button type="button" class="btn-eliminar-fila">Eliminar</button>
                    </td>
                `;
                return tr;
            }

            tbodyMuestras.addEventListener("click", function (e) {
                if (e.target.classList.contains("btn-eliminar-fila")) {
                    const filas = tbodyMuestras.querySelectorAll(".fila-muestra");
                    if (filas.length > 1) {
                        e.target.closest(".fila-muestra").remove();
                        renumerarFilas();
                    }
                }
            });

            renumerarFilas();
        });
    </script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        var csrftoken = "{{ csrf_token }}";
    </script>
    <script src="{% static 'control_de_pesos/scrip_r_control_de_pesos.js' %}"></script>
</body>
</html>
