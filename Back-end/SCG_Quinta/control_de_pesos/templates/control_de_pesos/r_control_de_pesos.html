        .muestras-box {
            margin-top: 18px;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.75);
            border: 1px solid #e5e7eb;
        }

        .muestras-titulo {
            margin: 0 0 12px 0;
            font-size: 16px;
            font-weight: 700;
            color: #B43C2C;
            text-align: center;
        }

        .tabla-muestras-wrap {
            width: 100%;
            overflow-x: auto;
        }

        .tabla-muestras {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .tabla-muestras th,
        .tabla-muestras td {
            border: 1px solid #e5e7eb;
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }

        .tabla-muestras th {
            background: #f8f8f8;
            font-weight: 700;
            font-size: 13px;
        }

        .tabla-muestras input {
            width: 100%;
            min-width: 110px;
            box-sizing: border-box;
            margin: 0;
        }

        .num-muestra {
            font-weight: 700;
            color: #B43C2C;
            width: 48px;
        }

        .acciones-muestras {
            margin-top: 14px;
            display: flex;
            justify-content: center;
        }

        .btn-secundario {
            background-color: #d07020;
            border-radius: 8px;
            border: none;
            color: white;
            min-width: 180px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            min-height: 42px;
            padding: 8px 16px;
        }

        .btn-secundario:hover {
            opacity: 0.95;
        }

        .btn-eliminar-fila {
            background-color: #B43C2C;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            min-height: 36px;
            padding: 8px 12px;
        }

        .btn-eliminar-fila:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .muestras-box {
                padding: 12px;
            }

            .tabla-muestras th,
            .tabla-muestras td {
                padding: 8px;
            }

            .btn-secundario {
                width: 100%;
            }
        }
    </style>
</head>

                        opt.textContent = prod.text;
                        opt.setAttribute('data-peso', prod.peso);
                        opt.setAttribute('data-codigo', prod.codigo);
                        selectProducto.appendChild(opt);
                    });

                    if (opt) {
                        inputPeso.value   = opt.getAttribute('data-peso') || '';
                        inputCodigo.value = opt.getAttribute('data-codigo') || '';
                    } else {
                        inputPeso.value   = '';

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tbodyMuestras = document.getElementById("tbody-muestras");
            const btnAgregarFila = document.getElementById("btn-agregar-fila");

            function renumerarFilas() {
                const filas = tbodyMuestras.querySelectorAll(".fila-muestra");
                filas.forEach((fila, index) => {
                    const celdaNumero = fila.querySelector(".num-muestra");
                    const btnEliminar = fila.querySelector(".btn-eliminar-fila");

                    if (celdaNumero) {
                        celdaNumero.textContent = index + 1;
                    }

                    if (btnEliminar) {
                        btnEliminar.disabled = filas.length === 1;
                    }
                });
            }

            function crearFila() {
                const tr = document.createElement("tr");
                tr.className = "fila-muestra";
                tr.innerHTML = `
                    <td class="num-muestra"></td>
                    <td>
                        <input
                            type="number"
                            class="input input-peso-real"
                            min="0"
                            step="1"
                            placeholder="-"
                            required
                        >
                    </td>
                    <td>
                        <input
                            type="number"
                            class="input input-altura"
                            min="0"
                            step="1"
                            placeholder="-"
                        >
                    </td>
                    <td>
                        <button type="button" class="btn-eliminar-fila">Eliminar</button>
                    </td>
                `;
                return tr;
            }

            tbodyMuestras.addEventListener("click", function (e) {
                if (e.target.classList.contains("btn-eliminar-fila")) {
                    const filas = tbodyMuestras.querySelectorAll(".fila-muestra");
                    if (filas.length > 1) {
                        e.target.closest(".fila-muestra").remove();
                        renumerarFilas();
                    }
                }
            });

            renumerarFilas();
        });
    </script>
