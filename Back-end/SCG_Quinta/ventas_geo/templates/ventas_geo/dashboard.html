{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard ventas geográficas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    {{ heat_data|json_script:"heat-data" }}
    {{ marcadores|json_script:"marcadores-data" }}
    <link rel="stylesheet" href="{% static 'ventas_geo/dashboard.css' %}">
    <link rel="icon" href="{% static 'ventas_geo/images/logoquinta2.png' %}" />
    
</head>
<body>

    <div class="box filtros">
        <h1>Dashboard geográfico de ventas</h1>

        <form method="get">
            <div>
                <label for="producto">Producto</label>
                <select name="producto" id="producto">
                    <option value="">Todos</option>
                    {% for p in productos %}
                        <option value="{{ p.id }}" {% if producto_id == p.id|stringformat:"s" %}selected{% endif %}>
                            {{ p.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="fecha_desde">Fecha desde</label>
                <input type="date" name="fecha_desde" id="fecha_desde" value="{{ fecha_desde }}">
            </div>

            <div>
                <label for="fecha_hasta">Fecha hasta</label>
                <input type="date" name="fecha_hasta" id="fecha_hasta" value="{{ fecha_hasta }}">
            </div>

            <div>
                <button type="submit">Filtrar</button>
            </div>
        </form>
    </div>

    <div class="box">
        <div class="kpis">
            <div class="kpi">
                <strong>Total vendido</strong>
                <div>{{ total_general }}</div>
            </div>
            <div class="kpi">
                <strong>Puntos geográficos</strong>
                <div>{{ cantidad_puntos }}</div>
            </div>
        </div>
    </div>

    <div class="box">
        <div class="mapa-header">
            <h2>Mapa de ventas</h2>

            <div class="acciones">
                <a href="{% url 'ventas_geo:resultado_carga' carga_id %}" class="btn-volver">
                    ← Resultados
                </a>

                <button type="button" id="btnFullscreen">
                    Pantalla completa
                </button>
            </div>
        </div>

        <div id="mapa"></div>
    </div>
    <script>
        const heatData = JSON.parse(document.getElementById('heat-data').textContent);
        const marcadores = JSON.parse(document.getElementById('marcadores-data').textContent);

        const mapa = L.map('mapa').setView([-33.45, -70.66], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap'
        }).addTo(mapa);

        function obtenerColorPorIntensidad(intensidad) {
            if (intensidad >= 0.85) return '#b91c1c';   // rojo fuerte
            if (intensidad >= 0.65) return '#ea580c';   // naranjo
            if (intensidad >= 0.45) return '#eab308';   // amarillo
            if (intensidad >= 0.25) return '#22c55e';   // verde
            return '#2563eb';                           // azul
        }

        if (heatData.length > 0) {
            L.heatLayer(heatData, {
                radius: 18,
                blur: 12,
                maxZoom: 17,
                minOpacity: 0.28,
                gradient: {
                    0.10: '#2563eb',
                    0.30: '#22c55e',
                    0.50: '#eab308',
                    0.70: '#f97316',
                    1.00: '#dc2626'
                }
            }).addTo(mapa);

            const bounds = [];

            marcadores.forEach(item => {
                bounds.push([item.latitud, item.longitud]);

                // marcador clásico
                L.marker([item.latitud, item.longitud])
                    .addTo(mapa)
                    .bindPopup(`
                        <strong>${item.local}</strong><br>
                        Dirección: ${item.direccion}<br>
                        Comuna: ${item.comuna || ''}<br>
                        Ciudad: ${item.ciudad || ''}<br>
                        Total vendido: ${item.total_vendido}
                    `);

                // círculo proporcional para mostrar diferencias reales de venta
                L.circleMarker([item.latitud, item.longitud], {
                    radius: item.radio,
                    color: obtenerColorPorIntensidad(item.intensidad),
                    weight: 2,
                    fillColor: obtenerColorPorIntensidad(item.intensidad),
                    fillOpacity: 0.35
                })
                .addTo(mapa)
                .bindPopup(`
                    <strong>${item.local}</strong><br>
                    Dirección: ${item.direccion}<br>
                    Comuna: ${item.comuna || ''}<br>
                    Ciudad: ${item.ciudad || ''}<br>
                    Total vendido: ${item.total_vendido}
                `);
            });

            if (bounds.length > 0) {
                mapa.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        const btnFullscreen = document.getElementById('btnFullscreen');
        const mapaDiv = document.getElementById('mapa');

        if (btnFullscreen) {
            btnFullscreen.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    mapaDiv.requestFullscreen().then(() => {
                        setTimeout(() => mapa.invalidateSize(), 300);
                    });
                } else {
                    document.exitFullscreen();
                }
            });

            document.addEventListener('fullscreenchange', () => {
                setTimeout(() => mapa.invalidateSize(), 300);
            });
        }
    </script>
</body>
</html>
