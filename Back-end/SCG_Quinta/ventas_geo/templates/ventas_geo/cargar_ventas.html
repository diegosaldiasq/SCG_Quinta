{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar ventas georreferenciadas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ventas_geo/cargar_ventas.css' %}">
    <link rel="icon" href="{% static 'ventas_geo/images/logoquinta2.png' %}" />
</head>
<body>

<div class="contenedor">
    <div class="box">

        <h1>Cargar archivo de ventas</h1>

        <div class="info">
            <strong>Formato esperado:</strong><br>
            producto | local | direccion | comuna | ciudad | cantidad | fecha
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="msg {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="botones">
                <button type="submit" class="btn-procesar">
                    Procesar archivo
                </button>

                <a href="{% url 'index' %}" class="btn-volver">
                    Volver al inicio
                </a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
